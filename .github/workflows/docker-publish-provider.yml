name: Publish provider image to Docker Hub

# Triggers:
#   - Push a `vX.Y.Z` git tag → builds + pushes that version + :latest
#   - Manual dispatch from the Actions tab → builds + pushes the input tag
#
# Required repo secrets:
#   DOCKERHUB_USERNAME — your Docker Hub user (e.g. chovy)
#   DOCKERHUB_TOKEN    — Access token (Settings → Security → Access Tokens)
#
# Set those in GitHub: Settings → Secrets and variables → Actions.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.1.2)'
        required: true
        type: string
      latest:
        description: 'Also push :latest'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version + tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            PUSH_LATEST="true"
          else
            VERSION="${{ inputs.tag }}"
            PUSH_LATEST="${{ inputs.latest }}"
          fi
          IMAGE="chovy/infernetprotocol"
          TAGS="${IMAGE}:${VERSION}"
          if [ "$PUSH_LATEST" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS"       >> "$GITHUB_OUTPUT"
          echo "Will push: $TAGS"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.provider
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Inline cache so subsequent rebuilds reuse layers.
          cache-from: type=registry,ref=chovy/infernetprotocol:buildcache
          cache-to:   type=registry,ref=chovy/infernetprotocol:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/profullstack/infernet-protocol
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.title=Infernet Protocol provider
            org.opencontainers.image.description=Provider node for the Infernet Protocol P2P GPU network
            org.opencontainers.image.licenses=MIT

      - name: Image summary
        run: |
          echo "## Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with: \`docker pull chovy/infernetprotocol:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
