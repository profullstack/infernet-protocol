version: '3.8'

services:
  infernet-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: infernet-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    networks:
      - infernet-network

networks:
  infernet-network:
    driver: bridge
