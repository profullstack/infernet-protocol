name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # create GitHub Release + attach assets
  packages: write      # push Docker images to ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Docker — build ghcr.io/<owner>/infernet-provider:<version> + :latest
  # directly from the git checkout (no npm registry needed). Multi-arch.
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push provider image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: tooling/docker/provider/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/infernet-provider:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/infernet-provider:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  # ---------------------------------------------------------------------------
  # GitHub Release — capture the version + Docker pull command as release notes.
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.docker.outputs.version }}
          name: Infernet v${{ needs.docker.outputs.version }}
          body: |
            ## Infernet v${{ needs.docker.outputs.version }}

            ### Run a provider node

            ```bash
            docker run --rm -it \
              --gpus all \
              -p 46337:46337 \
              -e SUPABASE_URL=https://<your-project>.supabase.co \
              -e SUPABASE_SERVICE_ROLE_KEY=<your-service-role-key> \
              -e INFERNET_NODE_NAME=<your-node-name> \
              ghcr.io/${{ github.repository_owner }}/infernet-provider:${{ needs.docker.outputs.version }}
            ```

            Multi-arch: `linux/amd64` + `linux/arm64`.

            ### Platforms coming soon

            npm packages (`@infernetprotocol/*`) and Homebrew install (`brew install infernet`) are on the roadmap but not shipped with this release. For now, Docker is the supported install path.
